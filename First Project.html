<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple HTML Page</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      .card {
        background: #ffffff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
        max-width: 420px;
      }

      button {
        margin-top: 1rem;
        padding: 0.6rem 1rem;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello!</h1>
      <p>This is a simple HTML page.</p>
      <button type="button">Click me</button>
    </main>
  </body>
</html>
